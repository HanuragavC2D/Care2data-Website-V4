<!DOCTYPE html>
<html>

<style>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">

      <stop offset="50%"  stop-color="#0b1a38"/>

    <filter id="goldGlow" x="-40%" y="-40%" width="180%" height="180%">

      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
