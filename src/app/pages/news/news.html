<!-- ═══ HERO ═══ -->
<section class="news-hero" style="background: linear-gradient(180deg, #090f21 0%, #0e1f44 42%, #08112a 100%);">
    <div class="news-hero__inner">
        <span class="news-eyebrow">Knowledge Hub</span>
        <h1>Resources</h1>
        <p>Updates, research, and perspectives from Care2Data.</p>
        <div class="news-divider"></div>
    </div>
</section>

<!-- ═══ ARTICLES ═══ -->
<section class="news-section" style="background: linear-gradient(180deg, #07102a 0%, #0b1836 100%);">
    <div class="news-inner">

        <!-- Category Tabs -->
        <div class="news-tabs">
            <button *ngFor="let c of categories"
                (click)="selectedCategory = c.value"
                [ngClass]="selectedCategory === c.value ? 'news-tab news-tab-active' : 'news-tab'">
                {{ c.label }}
            </button>
        </div>

        <!-- Article List -->
        <div style="display: flex; flex-direction: column;">
            <div *ngFor="let article of paginatedArticles" class="news-article">

                <div class="news-article__img">
                    <img [src]="article.image" [alt]="article.title" />
                </div>

                <div class="news-article__body">
                    <span class="news-article__category">{{ article.category }}</span>
                    <h3 class="news-article__title">{{ article.title }}</h3>
                    <p class="news-article__desc">{{ article.description }}</p>
                    <div class="news-article__footer">
                        <span class="news-article__date">{{ article.date }}</span>
                        <a [href]="article.link" target="_blank" rel="noopener noreferrer" class="news-article__read-more">Read More →</a>
                    </div>
                </div>

            </div>
        </div>

        <!-- Pagination -->
        <div *ngIf="articles.length > pageSize" class="news-pagination">
            <button (click)="prevPage()" [disabled]="currentPage === 1" class="page-btn">‹</button>

            <button *ngFor="let page of [].constructor(totalPages); let i = index"
                (click)="goToPage(i + 1)"
                [ngClass]="currentPage === i + 1 ? 'page-btn active' : 'page-btn'">
                {{ i + 1 }}
            </button>

            <button (click)="nextPage()" [disabled]="currentPage === totalPages" class="page-btn">›</button>
        </div>

    </div>
</section>
