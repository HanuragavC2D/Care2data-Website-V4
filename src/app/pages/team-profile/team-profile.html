<div *ngIf="leader" class="tp-page">

  <!-- ── Hero ── -->
  <section class="tp-hero">
    <div class="tp-hero__bg"></div>
    <div class="tp-hero__overlay"></div>

    <div class="tp-hero__content">
      <a routerLink="/about-us" fragment="leadership" class="tp-back">← Back to Leadership</a>

      <div class="tp-hero__card">
        <div class="tp-hero__photo-wrap">
          <img [src]="leader.photo" [alt]="leader.name" class="tp-hero__photo">
          <div class="tp-hero__photo-ring"></div>
        </div>
        <div class="tp-hero__info">
          <span class="tp-eyebrow">Leadership</span>
          <h1 class="tp-name">{{ leader.name }}</h1>
          <p class="tp-role">{{ leader.role }}</p>
          <p class="tp-tagline">{{ leader.tagline }}</p>
          <a [href]="leader.linkedin" target="_blank" rel="noopener noreferrer" class="tp-linkedin">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
              <path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z"/>
            </svg>
            View LinkedIn Profile
          </a>
        </div>
      </div>
    </div>
  </section>

  <!-- ── Bio ── -->
  <section class="tp-section tp-bio">
    <div class="tp-inner">
      <div class="tp-section-label">Profile Overview</div>
      <div class="tp-bio__paragraphs">
        <p *ngFor="let para of leader.bio">{{ para }}</p>
      </div>
    </div>
  </section>

  <!-- ── Expertise ── -->
  <section class="tp-section tp-expertise">
    <div class="tp-inner">
      <div class="tp-section-label">Areas of Expertise</div>
      <div class="tp-expertise__grid">
        <div *ngFor="let item of leader.expertise; let i = index"
             class="tp-expertise__tag"
             [ngClass]="'tp-expertise__tag--' + ((i % 4) + 1)">
          {{ item }}
        </div>
      </div>
    </div>
  </section>

</div>

<!-- Not found -->
<div *ngIf="!leader" class="tp-notfound">
  <p>Profile not found.</p>
  <a routerLink="/about-us" class="btn btn-primary">← Back to About</a>
</div>
