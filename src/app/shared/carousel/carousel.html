<div class="overflow-hidden pt-0 lg:pt-5">
  <div class="carousel-nav-row">
    <button class="carousel-arrow carousel-arrow--prev" (click)="go(-1)" aria-label="Previous slide">
      &#8592;
    </button>
    <button class="carousel-arrow carousel-arrow--next" (click)="go(1)" aria-label="Next slide">
      &#8594;
    </button>
  </div>
  <div class="relative h-[250px] md:h-[250px] lg:h-[260px] flex items-center justify-center perspective-[900px]"
    role="region" aria-label="Carousel" aria-roledescription="carousel">
    <ng-container *ngFor="let card of cards; let i = index">
      <div
        *ngIf="shouldShowCard(i)"
        (click)="onCardClick(i)"
        (keydown.enter)="onCardClick(i)"
        (keydown.space)="onCardClick(i); $event.preventDefault()"
        [attr.tabindex]="getPos(i) === 'center' ? 0 : -1"
        role="group"
        [attr.aria-label]="'Slide ' + (i + 1) + ' of ' + cards.length"
        class="absolute rounded-2xl p-6 w-full md:w-[420px] lg:w-[480px] h-[250px] md:h-[250px] lg:h-[240px] cursor-pointer border transition-all duration-700 ease-[cubic-bezier(0.34,1.2,0.64,1)] carousel-card"
        [ngStyle]="getStyles(i)"
      >
        <!-- Custom template (e.g. knowledge-services) -->
        <ng-container
          *ngIf="cardTemplate; else defaultCard"
          [ngTemplateOutlet]="cardTemplate!"
          [ngTemplateOutletContext]="{ card: card, $implicit: card }"
        ></ng-container>

        <!-- Default template (about, engagement) -->
        <ng-template #defaultCard>
          <div class="carousel-icon">
            {{ card.icon }}
          </div>
          <h3 class="font-semibold mb-2">{{ card.title }}</h3>
          <p class="leading-relaxed mb-2" *ngIf="card.description">{{ card.description }}</p>
          <a
            *ngIf="card.link"
            [routerLink]="[card.link]"
            [fragment]="card.fragment"
            class="carousel-link mt-3 inline-block"
          >
            Read More →
          </a>
        </ng-template>
      </div>
    </ng-container>
  </div>
  <div class="carousel-dots" role="tablist" aria-label="Slide navigation">
    <div
      *ngFor="let d of cards; let i = index"
      (click)="goTo(i)"
      (keydown.enter)="goTo(i)"
      [attr.tabindex]="0"
      role="tab"
      [attr.aria-selected]="i === active"
      [attr.aria-label]="'Go to slide ' + (i + 1)"
      class="carousel-dot"
      [ngClass]="i === active ? 'active' : ''"
    >
    </div>
  </div>
</div>
