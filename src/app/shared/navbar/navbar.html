<!-- Scroll Progress Bar (fixed, top of viewport) -->
<div class="scroll-progress-bar" [style.width.%]="scrollProgress"></div>

<nav class="fixed top-0 left-0 w-full z-50 bg-[#0B1020] border-b border-white/10 shadow-lg" role="navigation" aria-label="Main navigation">

    <div class="w-full px-4 sm:px-6 xl:px-8 py-4 flex justify-between items-center">

        <!-- Logo -->
        <div class="flex-shrink-0 w-32 sm:w-40">
            <img src="assets/logo.png" routerLink="/" alt="Care2Data logo" width="128" height="26" class="w-full h-auto cursor-pointer">
        </div>

        <div class="flex items-center gap-2 md:gap-4 xl:gap-6">

            <!-- Desktop Menu -->
            <div class="hidden lg:flex items-center space-x-1">

                <a routerLink="/" class="text-sm text-[#E0E0E0] font-semibold px-2 xl:px-3 py-2 rounded-lg
                hover:bg-white/10 hover:text-[#417ae3]
                transition-all duration-300">
                    Home
                </a>

                <a routerLink="/about-us" class="text-sm text-[#E0E0E0] font-semibold px-2 xl:px-3 py-2 rounded-lg
                hover:bg-white/10 hover:text-[#417ae3]
                transition-all duration-300">
                    About Us
                </a>

                <a routerLink="/knowledge-services" class="text-sm text-[#E0E0E0] font-semibold px-2 xl:px-3 py-2 rounded-lg
                hover:bg-white/10 hover:text-[#417ae3]
                transition-all duration-300">
                    Our Solutions
                </a>

                <a routerLink="/engagement-models" class="text-sm text-[#E0E0E0] font-semibold px-2 xl:px-3 py-2 rounded-lg
                hover:bg-white/10 hover:text-[#417ae3]
                transition-all duration-300">
                    Our Services
                </a>

                <div class="relative group inline-block">

                    <!-- Main Link -->
                    <a class="flex items-center gap-1 text-sm text-[#E0E0E0] font-semibold px-2 xl:px-3 py-2 rounded-lg
           hover:bg-white/10 hover:text-[#417ae3]
           transition-all duration-300">

                        Product

                        <!-- Arrow Icon -->
                        <mat-icon class="text-base transition-transform duration-300 group-hover:rotate-180">
                            expand_more
                        </mat-icon>

                    </a>

                    <!-- Dropdown -->
                    <div class="absolute left-0 mt-2 p-2 w-48 bg-[#11193e] border border-white/10 rounded-xl shadow-lg
           opacity-0 invisible group-hover:opacity-100 group-hover:visible group-hover:rounded-xl
           translate-y-2 group-hover:translate-y-0
           transition-all duration-300 z-50">

                        <a routerLink="/kwalify"
                            class="block px-4 py-2 text-sm text-white hover:bg-white/10 hover:text-[#f0ca33] group-hover:rounded-lg">
                            Kwalify&#8482;
                        </a>

                        <a routerLink="/trialgen"
                            class="block px-4 py-2 text-sm text-white hover:bg-white/10 hover:text-[#f0ca33] group-hover:rounded-lg">
                            TrialGen&#8482;
                        </a>

                    </div>

                </div>

                <!-- Resources: hidden until content is refined
                <a routerLink="/news" class="text-sm text-[#E0E0E0] font-semibold px-2 xl:px-3 py-2 rounded-lg
                hover:bg-white/10 hover:text-[#417ae3]
                transition-all duration-300">
                    Resources
                </a>
                -->

                <a routerLink="/contact-us" class="text-sm text-[#E0E0E0] font-semibold px-2 xl:px-3 py-2 rounded-lg
                hover:bg-white/10 hover:text-[#417ae3]
                transition-all duration-300">
                    Contact Us
                </a>

            </div>

            <!-- CTA -->
            <button routerLink="/contact-us"
                class="navbar-cta-btn hidden lg:inline-flex items-center justify-center gap-2 text-xs rounded-xl md:text-sm px-3 xl:px-6 py-3 cursor-pointer font-semibold uppercase rounded-md">
                Request a Demo →
            </button>

        </div>

        <!-- Mobile Button -->
        <div class="lg:hidden flex-shrink-0 nav-menu">
            <button mat-icon-button (click)="toggleMenu()" class="text-white hover:text-[#417ae3] transition"
                [attr.aria-expanded]="isMenuOpen" aria-label="Toggle navigation menu">
                <mat-icon class="text-2xl text-[#ffffff]">
                    {{!isMenuOpen ? 'menu':'close'}}
                </mat-icon>
            </button>
        </div>

    </div>

    <!-- Mobile Menu -->
    <div class="absolute left-0 right-0 w-full lg:hidden
bg-[#0d1117] border-t border-white/10
transition-all duration-500 ease-in-out"
        [ngClass]="isMenuOpen
  ? 'max-h-[calc(100vh-72px)] opacity-100 overflow-y-auto'
  : 'max-h-0 opacity-0 overflow-hidden'"
        [attr.aria-hidden]="!isMenuOpen"
        role="menu">

        <ng-container *ngIf="isMenuOpen">
        <div class="flex flex-col px-4 sm:px-6 py-4 space-y-1">

            <a routerLink="/" (click)="closeMenu()" class="text-base text-[#E0E0E0] font-semibold px-4 py-3 rounded-lg
        hover:bg-white/10 hover:text-[#417ae3] transition">
                Home
            </a>

            <a routerLink="/about-us" (click)="closeMenu()" class="text-base text-[#E0E0E0] font-semibold px-4 py-3 rounded-lg
        hover:bg-white/10 hover:text-[#417ae3] transition">
                About Us
            </a>

            <a routerLink="/knowledge-services" (click)="closeMenu()" class="text-base text-[#E0E0E0] font-semibold px-4 py-3 rounded-lg
        hover:bg-white/10 hover:text-[#417ae3] transition">
                Our Solutions
            </a>

            <a routerLink="/engagement-models" (click)="closeMenu()" class="text-base text-[#E0E0E0] font-semibold px-4 py-3 rounded-lg
        hover:bg-white/10 hover:text-[#417ae3] transition">
                Our Services
            </a>

            <!-- Mobile Product Dropdown -->
            <button (click)="toggleMobileDropdown('product')" class="w-full text-left text-base text-white/80 font-semibold px-4 py-3 rounded-lg
        hover:bg-white/10 hover:text-[#417ae3] transition flex items-center justify-between">
                Product
                <svg class="w-4 h-4" [ngClass]="{'rotate-180': mobileProductOpen}" fill="none" stroke="currentColor"
                    viewBox="0 0 24 24">
                    <path stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
                </svg>
            </button>
            <div *ngIf="mobileProductOpen" class="pl-4 space-y-1">
                <a routerLink="/kwalify" (click)="onMobileLinkClick()" class="block text-base text-secondary font-semibold px-4 py-2 rounded-lg
            hover:bg-white/10 hover:text-[#417ae3] transition">
                    Kwalify&#8482;
                </a>
                <a routerLink="/trialgen" (click)="onMobileLinkClick()" class="block text-base text-secondary font-semibold px-4 py-2 rounded-lg
            hover:bg-white/10 hover:text-[#417ae3] transition">
                    TrialGen&#8482;
                </a>
            </div>

            <!-- Resources: hidden until content is refined
            <a routerLink="/news" (click)="onMobileLinkClick()" class="text-base text-[#E0E0E0] font-semibold px-4 py-3 rounded-lg
        hover:bg-white/10 hover:text-[#417ae3] transition">
                Resources
            </a>
            -->

            <a routerLink="/contact-us" (click)="onMobileLinkClick()" class="text-base text-[#E0E0E0] font-semibold px-4 py-3 rounded-lg
        hover:bg-white/10 hover:text-[#417ae3] transition">
                Contact Us
            </a>

            <button routerLink="/contact-us" (click)="onMobileLinkClick()"
                class="navbar-cta-btn inline-flex items-center justify-center gap-2 text-xs rounded-xl md:text-sm px-6 py-3 cursor-pointer font-semibold uppercase rounded-md">
                Request a Demo →
            </button>

        </div>
        </ng-container>
    </div>

</nav>
